apiVersion: apps/v1
kind: Deployment
metadata:
  name: recla-app
  namespace: recla-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recla-app
  template:
    metadata:
      labels:
        app: recla-app
    spec:
      containers:
      - name: recla-app
        image: recla-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80